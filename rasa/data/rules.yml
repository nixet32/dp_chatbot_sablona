version: "3.1"

rules:
  - rule: Help
    steps:
      - intent: help
      - action: utter_help

  - rule: Fallback
    steps:
      - intent: nlu_fallback
      - action: utter_fallback

  - rule: Search product
    steps:
      - intent: search_product
      - action: action_search_product

  - rule: Order status (form)
    steps:
      - intent: order_status
      - action: order_status_form
      - active_loop: order_status_form

  - rule: Submit order status form
    condition:
      - active_loop: order_status_form
    steps:
      - action: order_status_form
      - active_loop: null
      - action: action_get_order_status

  - rule: Check stock entry
    steps:
      - intent: check_stock
      - action: action_route_check_stock

  - rule: Check stock confirm yes
    condition:
      - slot_was_set:
          - candidate_product_name
    steps:
      - intent: affirm
      - action: action_set_candidate_as_product
      - action: action_clear_candidate
      - action: stock_form
      - active_loop: stock_form

  - rule: Check stock confirm no
    condition:
      - slot_was_set:
          - candidate_product_name
    steps:
      - intent: deny
      - action: action_clear_candidate
      - action: action_reset_product_name
      - action: utter_ask_product_name

  - rule: Submit stock form
    condition:
      - active_loop: stock_form
    steps:
      - action: stock_form
      - active_loop: null
      - action: action_check_stock

  - rule: Add to cart
    steps:
      - intent: add_to_cart
      - action: action_add_to_cart

  - rule: Remove from cart
    steps:
      - intent: remove_from_cart
      - action: action_remove_from_cart

  - rule: Show cart
    steps:
      - intent: show_cart
      - action: action_show_cart

  - rule: Clear cart
    steps:
      - intent: clear_cart
      - action: action_clear_cart

  - rule: Shipping info
    steps:
      - intent: shipping_info
      - action: utter_shipping_info

  - rule: Payment info
    steps:
      - intent: payment_info
      - action: utter_payment_info

  - rule: Return policy
    steps:
      - intent: return_policy
      - action: utter_return_policy

  - rule: Out of scope
    steps:
      - intent: out_of_scope
      - action: utter_fallback

  - rule: List products
    steps:
      - intent: list_products
      - action: action_list_products

  - rule: List in-stock products
    steps:
      - intent: list_in_stock_products
      - action: action_list_in_stock_products

  - rule: Goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Greet
    steps:
      - intent: greet
      - action: utter_greet
